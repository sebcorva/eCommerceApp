<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador</title>
    <!--Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <!--Header-->
    <header class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm py-3" id="inicio">
        <div class="container-fluid px-md-5">
            <a class="navbar-brand d-flex align-items-center gap-2 m-0" href="index.html">
                <img src="assets/img/logo.png" alt="Logo de aniMug" height="50" class="d-inline-block animacion_logo">
                <h1 class="h3 m-0 fw-bold text-primary">aniMug</h1>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#menuNavegacion" aria-controls="menuNavegacion" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="menuNavegacion">
                <ul class="navbar-nav align-items-center gap-3 mt-3 mt-lg-0 ms-auto me-lg-3">
                    <li class="nav-item">
                        <a class="nav-link p-0 text-primary fw-semibold link-primary" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link p-0 text-primary fw-semibold link-primary"
                            href="index.html#categoria">Categorías</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link p-0 text-primary fw-semibold link-primary"
                            href="index.html#contacto">Contacto</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link p-0 text-danger position-relative" href="carrito.html"
                            title="Carrito de compras">
                            <i class="bi bi-cart fs-4"></i>
                            <span
                                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
                        </a>
                    </li>
                </ul>
                <div class="d-flex flex-column flex-lg-row gap-2 mt-2 mt-lg-0">
                    <a class="btn btn-danger fw-semibold" href="#">Iniciar Sesión</a>
                    <a class="btn btn-primary fw-semibold" href="registro.html">Registrarse</a>
                </div>
            </div>
        </div>
    </header>
    <!--Perfil de usuario-->
    <main class="container my-5">
        <div class="row g-4">

            <div class="col-12 col-lg-4">
                <div class="card shadow-sm border-0 p-4 bg-white rounded">
                    <h4 class="fw-bold text-secondary mb-3" id="formTitulo"><i
                            class="bi bi-plus-circle-fill me-2"></i>Agregar Producto</h4>
                    <hr>
                    <form id="formProducto">
                        <input type="hidden" id="productoId">

                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-semibold text-muted">Nombre del Producto</label>
                            <input type="text" class="form-control" id="nombre" required
                                placeholder="EJ: Taza Megumi Fushiguro">
                        </div>

                        <div class="mb-3">
                            <label for="categoria" class="form-label fw-semibold text-muted">Categoría</label>
                            <select class="form-select" id="categoria" required>
                                <option value="" disabled selected>Selecciona una categoría</option>
                                <option value="tazas">Tazas</option>
                                <option value="platos">Platos</option>
                                <option value="maceteros">Maceteros</option>
                                <option value="bowls">Bowls</option>
                            </select>
                        </div>

                        <div class="row">
                            <div class="col-6 mb-3">
                                <label for="precio" class="form-label fw-semibold text-muted">Precio Base ($)</label>
                                <input type="number" class="form-control" id="precio" min="0" required
                                    placeholder="12990">
                            </div>
                            <div class="col-6 mb-3">
                                <label for="descuento" class="form-label fw-semibold text-muted">Descuento (%)</label>
                                <input type="number" class="form-control" id="descuento" min="0" max="100" required
                                    value="0">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="stock" class="form-label fw-semibold text-muted">Stock Inicial</label>
                            <input type="number" class="form-control" id="stock" min="0" required placeholder="10">
                        </div>

                        <div class="mb-3">
                            <label for="imagen" class="form-label fw-semibold text-muted">Ruta de la Imagen</label>
                            <input type="text" class="form-control" id="imagen" required
                                placeholder="../assets/img/tazas/nueva.jpg">
                        </div>

                        <div class="mb-3">
                            <label for="descripcion" class="form-label fw-semibold text-muted">Descripción</label>
                            <textarea class="form-control" id="descripcion" rows="3" required
                                placeholder="Breve descripción del producto..."></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary fw-semibold" id="btnGuardar">Guardar
                                Producto</button>
                            <button type="button" class="btn btn-secondary fw-semibold d-none" id="btnCancelar">Cancelar
                                Edición</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-12 col-lg-8">
                <div class="card shadow-sm border-0 p-4 bg-white rounded">
                    <h4 class="fw-bold text-secondary mb-3"><i class="bi bi-collection-fill me-2"></i>Inventario de
                        Productos</h4>
                    <hr>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light text-muted">
                                <tr>
                                    <th>Imagen</th>
                                    <th>Producto</th>
                                    <th>Categoría</th>
                                    <th>Precio Base</th>
                                    <th>Desc.</th>
                                    <th>Stock</th>
                                    <th class="text-center">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tablaProductosBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>
    <!--Footer-->
    <footer class="bg-dark text-light py-5 border-top" id="contacto">
        <div class="container px-4 px-md-5">

            <div class="d-flex flex-column flex-sm-row justify-content-sm-between align-items-center gap-3 m-0">

                <div class="p-0 text-center text-sm-start">
                    <p class="m-0 text-white">&copy; 2026 aniMug</p>
                </div>

                <div class="p-0 text-center">
                    <p class="m-0">
                        Contacto: <a href="mailto:info@animug.com"
                            class="text-light text-decoration-none hover-link">info@animug.com</a>
                    </p>
                </div>

                <div class="p-0 text-center text-sm-end">
                    <div class="d-flex justify-content-center justify-content-sm-end gap-3 fs-5">
                        <a href="https://www.instagram.com/animug/" target="_blank"
                            class="text-light text-decoration-none hover-link" title="Instagram"><i
                                class="bi bi-instagram"></i></a>
                        <a href="https://www.tiktok.com/animug/" target="_blank"
                            class="text-light text-decoration-none hover-link" title="TikTok"><i
                                class="bi bi-tiktok"></i></a>
                        <a href="https://www.youtube.com/animug/" target="_blank"
                            class="text-light text-decoration-none hover-link" title="YouTube"><i
                                class="bi bi-youtube"></i></a>
                    </div>
                </div>

            </div>
        </div>
    </footer>
    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <!--Importar archivos JS-->
    <script src="assets/js/authHeader.js"></script>
    <script src="assets/js/perfil.js"></script>
    <script src="assets/js/productos.js"></script>
    <script src="assets/js/adminProductos.js"></script>
</body>

</html>

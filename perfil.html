<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuario</title>
    <!--Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <!--Header-->
    <header class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm py-3" id="inicio">
        <div class="container-fluid px-md-5">
            <a class="navbar-brand d-flex align-items-center gap-2 m-0" href="index.html">
                <img src="assets/img/logo.png" alt="Logo de aniMug" height="50" class="d-inline-block animacion_logo">
                <h1 class="h3 m-0 fw-bold text-primary">aniMug</h1>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#menuNavegacion" aria-controls="menuNavegacion" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="menuNavegacion">
                <ul class="navbar-nav align-items-center gap-3 mt-3 mt-lg-0 ms-auto me-lg-3">
                    <li class="nav-item">
                        <a class="nav-link p-0 text-primary fw-semibold link-primary" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link p-0 text-primary fw-semibold link-primary"
                            href="index.html#categoria">Categorías</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link p-0 text-primary fw-semibold link-primary"
                            href="index.html#contacto">Contacto</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link p-0 text-danger position-relative" href="carrito.html"
                            title="Carrito de compras">
                            <i class="bi bi-cart fs-4"></i>
                            <span
                                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
                        </a>
                    </li>
                </ul>
                <div class="d-flex flex-column flex-lg-row gap-2 mt-2 mt-lg-0">
                    <a class="btn btn-danger fw-semibold" href="#">Iniciar Sesión</a>
                    <a class="btn btn-primary fw-semibold" href="registro.html">Registrarse</a>
                </div>
            </div>
        </div>
    </header>
    <!--Perfil de usuario-->
    <main>
        <section class="container-perfil">
            <div class="row justify-content-center mx-2">
                <div class="col-12 col-sm-10 col-md-8 col-lg-9 bg-light rounded shadow my-4 my-lg-5 overflow-hidden">
                    <div class="row g-0 align-items-stretch">

                        <div class="col-lg-5 d-none d-lg-flex p-0" style="position: relative;">
                            <img src="assets/img/login.jpg" alt="Perfil AniMug" class="w-100 h-100 loginImage">
                        </div>

                        <div class="col-12 col-lg-7 p-4 p-lg-5">
                            <h2 class="text-center mb-4 text-secondary">Perfil de Usuario</h2>

                            <div class="card shadow-sm border-0 mb-4 p-3 bg-white">
                                <div class="d-flex align-items-center justify-content-between">
                                    <div class="d-flex align-items-center gap-3">
                                        <img src="assets/img/userDefault.jpg" alt="Foto de perfil"
                                            class="rounded-circle perfilImage">

                                        <div>
                                            <h5 class="m-0 h6 fw-bold text-dark" id="perfilNombre"></h5>
                                            <small class="text-muted d-block" style="font-size: 0.85rem;"
                                                id="perfilEmail"></small>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="card shadow-sm border-0 p-4 bg-white">
                                <div class="d-flex flex-column gap-3">

                                    <div class="d-flex justify-content-center justify-content-sm-start">
                                        <a href="#"
                                            class="btn btn-outline-primary btn-custom-profile d-flex align-items-center justify-content-center gap-2">
                                            <i class="bi bi-bag-check"></i> <span>Mis Compras</span>
                                        </a>
                                    </div>

                                    <div class="d-flex justify-content-center justify-content-sm-start">
                                        <a href="#"
                                            class="btn btn-outline-primary btn-custom-profile d-flex align-items-center justify-content-center gap-2">
                                            <i class="bi bi-chat-left-text"></i> <span>Mensajes</span>
                                        </a>
                                    </div>

                                    <div class="d-flex justify-content-center justify-content-sm-start">
                                        <a href="#"
                                            class="btn btn-outline-primary btn-custom-profile d-flex align-items-center justify-content-center gap-2">
                                            <i class="bi bi-ticket-perforated"></i> <span>Cupones</span>
                                        </a>
                                    </div>

                                    <div class="d-flex justify-content-center justify-content-sm-start">
                                        <button type="button"
                                            class="btn btn-outline-primary btn-custom-profile d-flex align-items-center justify-content-center gap-2"
                                            data-bs-toggle="modal" data-bs-target="#modalDireccion">
                                            <i class="bi bi-sliders"></i><span>Direcciones</span>
                                        </button>
                                    </div>

                                    <div class="d-flex justify-content-center justify-content-sm-start">
                                        <a href="#"
                                            class="btn btn-outline-primary btn-custom-profile d-flex align-items-center justify-content-center gap-2">
                                            <i class="bi bi-telephone"></i><span>Contacto</span>
                                        </a>
                                    </div>

                                </div>
                            </div>

                        </div>

                    </div>
                </div>
            </div>
        </section>
    </main>
    <!--modal dirección de despacho -->
    <div class="modal fade" id="modalDireccion" tabindex="-1" aria-labelledby="modalDireccionLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold text-secondary" id="modalDireccionLabel">Dirección de despacho</h5>
                    <button type="button" class="btn-close" data-bs-close="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="direccionForm">
                        <!-- Input Dirección -->
                        <div class="mb-3">
                            <label for="inputDireccion" class="form-label fw-semibold">Dirección</label>
                            <input type="text" class="form-control" id="inputDireccion"
                                placeholder="Calle, número, departamento..." value="Av. Siempre Viva 742">
                        </div>

                        <!-- Input Comuna -->
                        <div class="mb-3">
                            <label for="inputComuna" class="form-label fw-semibold">Comuna</label>
                            <input type="text" class="form-control" id="inputComuna" placeholder="Ej: Santiago"
                                value="Providencia">
                        </div>

                        <!-- Input Región -->
                        <div class="mb-3">
                            <label for="inputRegion" class="form-label fw-semibold">Región</label>
                            <input type="text" class="form-control" id="inputRegion"
                                placeholder="Ej: Región Metropolitana" value="Región Metropolitana">
                        </div>

                        <!-- Botones de Acción -->
                        <div class="d-flex gap-2 mt-4 justify-content-center">
                            <button type="submit" class="btn btn-primary w-50">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!--Footer-->
    <footer class="bg-dark text-light py-5 border-top" id="contacto">
        <div class="container px-4 px-md-5">

            <div class="d-flex flex-column flex-sm-row justify-content-sm-between align-items-center gap-3 m-0">

                <div class="p-0 text-center text-sm-start">
                    <p class="m-0 text-white">&copy; 2026 aniMug</p>
                </div>

                <div class="p-0 text-center">
                    <p class="m-0">
                        Contacto: <a href="mailto:info@animug.com"
                            class="text-light text-decoration-none hover-link">info@animug.com</a>
                    </p>
                </div>

                <div class="p-0 text-center text-sm-end">
                    <div class="d-flex justify-content-center justify-content-sm-end gap-3 fs-5">
                        <a href="https://www.instagram.com/animug/" target="_blank"
                            class="text-light text-decoration-none hover-link" title="Instagram"><i
                                class="bi bi-instagram"></i></a>
                        <a href="https://www.tiktok.com/animug/" target="_blank"
                            class="text-light text-decoration-none hover-link" title="TikTok"><i
                                class="bi bi-tiktok"></i></a>
                        <a href="https://www.youtube.com/animug/" target="_blank"
                            class="text-light text-decoration-none hover-link" title="YouTube"><i
                                class="bi bi-youtube"></i></a>
                    </div>
                </div>

            </div>
        </div>
    </footer>
    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <!--Importar archivos JS-->
    <script src="assets/js/authHeader.js"></script>
    <script src="assets/js/perfil.js"></script>
</body>

</html>
